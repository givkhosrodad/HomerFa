<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1b2a">
<title>HomerFa | مرجع فارسی هومر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink-deep: #0d1b2a;
    --ink-mid: #16283c;
    --gold: #c5a880;
    --gold-bright: #d8cdb8;
    --parchment: #f4ebd9;
    --parchment-dim: #a39581;
    --line: rgba(197, 168, 128, 0.28);
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #1c3049 0%, transparent 55%),
      linear-gradient(180deg, var(--ink-mid) 0%, var(--ink-deep) 65%, #08121d 100%);
    color: var(--parchment);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    position: relative;
  }

  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(197,168,128,0.06) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.5;
    pointer-events: none;
  }

  .frame {
    width: min(94vw, 980px);
    height: min(88vh, 780px);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: clamp(18px, 3vh, 40px) clamp(18px, 4vw, 56px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: fadeIn 0.9s ease-out;
  }

  .frame::before, .frame::after {
    content: "";
    position: absolute;
    width: 34px;
    height: 34px;
    border: 1px solid var(--gold);
    opacity: 0.55;
  }
  .frame::before { top: -1px; right: -1px; border-left: none; border-bottom: none; border-radius: 0 14px 0 0; }
  .frame::after { bottom: -1px; left: -1px; border-right: none; border-top: none; border-radius: 0 0 0 14px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-family: 'Amiri', serif;
    font-style: italic;
    font-size: clamp(0.75rem, 1.4vw, 0.95rem);
    letter-spacing: 0.12em;
    color: var(--parchment-dim);
    margin-bottom: 6px;
  }

  h1.title {
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 900;
    font-size: clamp(2.4rem, 6.2vw, 4.4rem);
    color: var(--gold-bright);
    margin: 0 0 4px;
    line-height: 1.15;
    text-shadow: 0 2px 24px rgba(197,168,128,0.25);
  }

  .subtitle {
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 300;
    font-size: clamp(0.85rem, 1.6vw, 1.05rem);
    color: var(--parchment-dim);
    margin: 0 0 clamp(20px, 4vh, 40px);
    letter-spacing: 0.02em;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: clamp(20px, 4vh, 40px);
  }

  /* سه کارت هم‌اندازه، زیر هم (عمودی) */
  .columns {
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 2vh, 22px);
    justify-content: center;
    align-items: stretch;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  .work-column {
    background: rgba(244, 235, 217, 0.03);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: clamp(14px, 2.2vh, 22px) clamp(16px, 3vw, 28px);
    width: 100%;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: border-color 0.25s, background 0.25s, transform 0.25s;
  }

  .work-column:hover {
    border-color: var(--gold);
    background: rgba(244, 235, 217, 0.06);
    transform: translateY(-3px);
  }

  .work-title {
    font-family: 'Amiri', serif;
    font-weight: 700;
    font-size: clamp(1.1rem, 2.6vw, 1.6rem);
    color: var(--gold-bright);
    margin: 0 0 8px;
  }

  .work-subtitle {
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 300;
    font-size: clamp(0.62rem, 1.3vw, 0.82rem);
    color: var(--parchment-dim);
    margin: 0;
    line-height: 1.6;
  }

  footer {
    margin-top: clamp(18px, 3vh, 32px);
    font-size: 0.72rem;
    color: var(--parchment-dim);
    opacity: 0.7;
    text-align: center;
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 300;
  }

  @media (max-height: 620px), (max-width: 420px) {
    html, body { overflow-y: auto; }
    body { height: auto; min-height: 100vh; display: block; padding: 20px 0; }
    .frame { height: auto; min-height: unset; margin: 0 auto; }
  }
</style>
</head>
<body>

<div class="frame">
  <div class="eyebrow">مرجعِ فارسیِ</div>
  <h1 class="title">هومر</h1>
  <p class="subtitle">راهنمای آثار و جهان هومری</p>
  <div class="divider"></div>

  <div class="columns">
    <a class="work-column" href="works.html">
      <h2 class="work-title">آثار</h2>
      <p class="work-subtitle">حماسه‌های هومری و آثار منسوب</p>
    </a>

    <a class="work-column" href="encyclopedia.html">
      <h2 class="work-title">دانشنامه</h2>
      <p class="work-subtitle">در باب هومر و حماسه‌های هومری</p>
    </a>

    <a class="work-column" href="iliad-glossary.html">
      <h2 class="work-title">واژه‌نامه</h2>
      <p class="work-subtitle">اعلام، اشخاص و مکان‌ها</p>
    </a>
  </div>

  <footer>ترجمه و گردآوری با کمک هوش مصنوعی — دقت مطالب کاملاً تضمین‌شده نیست</footer>
</div>

</body>
</html>
