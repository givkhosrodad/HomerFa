<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>واژه‌نامه اسامی و مکان‌های ایلیاد</title>
<style>
  :root {
    --bg: #f7f3ec;
    --card: #ffffff;
    --ink: #2b2420;
    --muted: #7a6f63;
    --accent: #8a4b3b;
    --accent-light: #f0e0d8;
    --border: #e4dcd0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Vazirmatn', Tahoma, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    padding: 20px 16px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 1.3rem;
    color: var(--accent);
  }
  header p {
    margin: 0;
    font-size: 0.85rem;
    color: var(--muted);
  }
  #search {
    width: 100%;
    max-width: 480px;
    margin: 12px auto 0;
    display: block;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 1rem;
    font-family: inherit;
  }
  .letter-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    padding: 10px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .letter-nav a {
    text-decoration: none;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 0.85rem;
  }
  main {
    max-width: 700px;
    margin: 0 auto;
    padding: 12px 12px 60px;
  }
  .letter-group {
    margin-top: 18px;
  }
  .letter-heading {
    font-size: 1.1rem;
    color: var(--accent);
    border-bottom: 2px solid var(--accent-light);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }
  .entry-btn {
    display: block;
    width: 100%;
    text-align: right;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s;
  }
  .entry-btn:active, .entry-btn:hover {
    background: var(--accent-light);
  }
  .entry-btn .eng {
    color: var(--muted);
    font-size: 0.8rem;
    font-family: 'Georgia', serif;
    margin-right: 8px;
  }
  /* Modal */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,20,15,0.45);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  #overlay.show { display: flex; }
  #modal {
    background: var(--card);
    width: 100%;
    max-width: 560px;
    border-radius: 18px 18px 0 0;
    padding: 22px 20px 28px;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
    animation: slideUp 0.2s ease-out;
    max-height: 80vh;
    overflow-y: auto;
  }
  @media (min-width: 600px) {
    #overlay { align-items: center; }
    #modal { border-radius: 18px; }
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  #modal h2 {
    margin: 0 0 2px;
    color: var(--accent);
    font-size: 1.4rem;
  }
  #modal .eng-name {
    color: var(--muted);
    font-family: 'Georgia', serif;
    font-size: 0.95rem;
    margin-bottom: 14px;
    display: block;
  }
  #modal p {
    line-height: 1.9;
    font-size: 1.02rem;
    margin: 0;
  }
  #closeBtn {
    display: block;
    margin: 20px auto 0;
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    cursor: pointer;
  }
  #noResults {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>واژه‌نامه اسامی و مکان‌های ایلیاد</h1>
  <p>برگرفته از ترجمه‌ی مایکل هیومن (Pressbooks) — روی هر نام بزنید تا توضیحش باز شود</p>
  <input type="text" id="search" placeholder="جستجوی نام...">
</header>

<div class="letter-nav" id="letterNav"></div>

<main id="mainList"></main>
<div id="noResults">نتیجه‌ای یافت نشد.</div>

<div id="overlay">
  <div id="modal">
    <h2 id="modalName"></h2>
    <span class="eng-name" id="modalEng"></span>
    <p id="modalDesc"></p>
    <button id="closeBtn">بستن</button>
  </div>
</div>

<script>
const DATA = [{"eng": "Abarbarea", "fa_name": "آبارباره‌آ", "desc": "پری نایاد چراگاه‌های رود آسپوس، همسر بوکولیون (پسر پادشاه تروایی لائومدون)، و مادر آسپوس و پداسوس که هر دو به دست ائوریالوس در جنگ تروا کشته شدند"}, {"eng": "Abantes", "fa_name": "آبانتیان", "desc": "قبیله‌ای یونی از یوبیا، جزیره‌ای بزرگ در ساحل شمال‌شرقی یونان امروزی"}, {"eng": "Ablerus", "fa_name": "آبلروس", "desc": "سرباز تروایی که به دست آنتیلوخوس، پسر نستور، کشته شد"}, {"eng": "Abydus", "fa_name": "آبیدوس", "desc": "شهر باستانی میسیایی در ساحل جنوبی هلسپونت، روبه‌روی سستوس"}, {"eng": "Abii", "fa_name": "آبی‌ها", "desc": "قبیله‌ای کوچ‌نشین باستانی و نامشخص که احتمالاً در استپ‌های شمال دریای سیاه می‌زیستند"}, {"eng": "Atreus", "fa_name": "آترئوس", "desc": "پادشاه میکنه و پدر آگاممنون و منلائوس"}, {"eng": "Athens", "fa_name": "آتن", "desc": "شهر-دولتی مهم یونان باستان و پایتخت یونان امروزی"}, {"eng": "Athena", "fa_name": "آتنا", "desc": "الهه‌ی خرد، صنایع دستی، و جنگ، دختر زئوس، و پشتیبان آخائیان در جنگ تروا"}, {"eng": "Atë", "fa_name": "آته", "desc": "نگاه کنید به بدبختی (Mischief)"}, {"eng": "Athos", "fa_name": "آثوس", "desc": "کوه و شبه‌جزیره‌ای در شمال‌شرق یونان"}, {"eng": "Achaeans", "fa_name": "آخائیان", "desc": "نام اصلی که هومر برای نیروهای یونانی به‌کار می‌برد"}, {"eng": "Achelous", "fa_name": "آخلوئوس", "desc": "بزرگ‌ترین رود یونان، پسر اوکئانوس و تتیس"}, {"eng": "Achilles", "fa_name": "آخیلوس", "desc": "پسر پله‌ئوس، فرمانده میرمیدون‌ها، و بزرگ‌ترین جنگجوی آخائیان"}, {"eng": "Adametus", "fa_name": "آدامتوس", "desc": "پادشاه فرای در تسالی و پسر ائومه‌لوس، فرمانده نیروهای فرای در جنگ تروا"}, {"eng": "Adrastus", "fa_name": "آدراستوس", "desc": "پسر مروپس، پادشاه پرکوته؛ همراه با برادرش آمفیوس فرماندهی نیروهای آدرستیایی را در جنگ تروا برعهده داشت؛ به دست دیومدس کشته شد"}, {"eng": "Adrasteia", "fa_name": "آدرستیا", "desc": "منطقه‌ای در تروآد نزدیک رود گرانیکوس"}, {"eng": "Artemis", "fa_name": "آرتمیس", "desc": "الهه‌ی شکار، بیابان، حیوانات وحشی، ماه، و پاکدامنی، دختر زئوس و لتو، و خواهر دوقلوی آپولون"}, {"eng": "Aretus", "fa_name": "آرتوس", "desc": "پسر پریام که به نگهداری اسب‌ها شهرت داشت، به دست آوتومدون کشته شد"}, {"eng": "Archelochus", "fa_name": "آرخه‌لوخوس", "desc": "داردانی، پسر آنتنور و ثه‌آنو، و یاور آینیاس در جنگ تروا"}, {"eng": "Ares", "fa_name": "آرس", "desc": "خدای جنگ، پسر زئوس و هرا و همسر آفرودیت"}, {"eng": "Arne", "fa_name": "آرنه", "desc": "شهری در بویوتیای باستان"}, {"eng": "Aereia", "fa_name": "آره‌آ", "desc": "شهری در مسنیای باستان، پلوپونز"}, {"eng": "Areilycus", "fa_name": "آره‌ایلیکوس", "desc": "بویوتیایی، پسر ایتونوس، و پدر پروثنور و آرخسیلائوس"}, {"eng": "Araethyrea", "fa_name": "آره‌ثوریا", "desc": "شهری در آرگولیس باستان، پلوپونز، به نام بنیان‌گذار افسانه‌ای‌اش آراس"}, {"eng": "Arcadia", "fa_name": "آرکادیا", "desc": "منطقه‌ای در مرکز پلوپونز، به نام شکارچی آرکاس، و زادگاه خدای پان"}, {"eng": "Arcesilaus", "fa_name": "آرکسیلائوس", "desc": "یکی از فرماندهان بویوتیایی‌ها که به دست هکتور کشته شد"}, {"eng": "Argos", "fa_name": "آرگوس", "desc": "شهری در آرگولیس، منطقه‌ای در پلوپونز و زادگاه دیومدس"}, {"eng": "Pelasgian Argos", "fa_name": "آرگوس پلاسگی", "desc": "منطقه‌ای در ساحل شرقی یونان که همچنین تسالی نامیده می‌شود"}, {"eng": "Argissa", "fa_name": "آرگیسا", "desc": "شهری در پلاسگیوتیس باستان، تسالی، بر رود پنئیوس نزدیک لاریسا"}, {"eng": "Ariadne", "fa_name": "آریادنه", "desc": "شاهزاده کرتی که به تسئوس در کشتن مینوتاور و فرار از هزارتوی کنوسوس کمک کرد و پس از نجات توسط دیونوسوس از هادس، جاودانه شد"}, {"eng": "Arisbe", "fa_name": "آریسبه", "desc": "شهری در میسیا در شمال‌غرب آناتولی"}, {"eng": "Arimoi", "fa_name": "آریموی", "desc": "منطقه‌ای که هیولای تیفونئوس در آن می‌زیست، هرچند موقعیت واقعی آن هرگز در آثار باستانی مشخص نشده"}, {"eng": "Arion", "fa_name": "آریون", "desc": "اسب الهی، رانده‌شده توسط آدراستوس، پادشاه آرگوس"}, {"eng": "Aerytus", "fa_name": "آری‌توس", "desc": "پادشاه اسطوره‌ای آرکادیا، پسر الاتوس"}, {"eng": "Assaracus", "fa_name": "آساراکوس", "desc": "پسر تروس، برادر ایلوس، گانومد، و لائومدون"}, {"eng": "Asteropaeu function persianFirstLetter(str) {
  return str.charAt(0);
}

function groupByLetter(entries) {
  const groups = {};
  entries.forEach(e => {
    const letter = persianFirstLetter(e.fa_name);
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(e);
  });
  return groups;
}

function render(filterText) {
  const main = document.getElementById('mainList');
  const noResults = document.getElementById('noResults');
  main.innerHTML = '';

  let filtered = DATA;
  if (filterText && filterText.trim()) {
    const q = filterText.trim().toLowerCase();
    filtered = DATA.filter(e =>
      e.fa_name.toLowerCase().includes(q) ||
      e.eng.toLowerCase().includes(q) ||
      e.desc.toLowerCase().includes(q)
    );
  }

  if (filtered.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  const groups = groupByLetter(filtered);
  const letters = Object.keys(groups).sort((a,b) => a.localeCompare(b, 'fa'));

  letters.forEach(letter => {
    const section = document.createElement('div');
    section.className = 'letter-group';
    section.id = 'letter-' + letter;

    const heading = document.createElement('div');
    heading.className = 'letter-heading';
    heading.textContent = letter;
    section.appendChild(heading);

    groups[letter].forEach(entry => {
      const btn = document.createElement('button');
      btn.className = 'entry-btn';
      btn.innerHTML = entry.fa_name + '<span class="eng">(' + entry.eng + ')</span>';
      btn.addEventListener('click', () => openModal(entry));
      section.appendChild(btn);
    });

    main.appendChild(section);
  });

  // letter nav
  const nav = document.getElementById('letterNav');
  nav.innerHTML = '';
  letters.forEach(letter => {
    const a = document.createElement('a');
    a.href = '#letter-' + letter;
    a.textContent = letter;
    nav.appendChild(a);
  });
}

function openModal(entry) {
  document.getElementById('modalName').textContent = entry.fa_name;
  document.getElementById('modalEng').textContent = '(' + entry.eng + ')';
  document.getElementById('modalDesc').textContent = entry.desc;
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
});
document.getElementById('overlay').addEventListener('click', (e) => {
  if (e.target.id === 'overlay') {
    document.getElementById('overlay').classList.remove('show');
  }
});

document.getElementById('search').addEventListener('input', (e) => {
  render(e.target.value);
});

render('');
</script>
